
<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simooo_Tv - In Ferie</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --twitch: #9146FF;
            --neon-pink: #ff00ff;
            --neon-cyan: #00f0ff;
            --neon-lime: #00ff41;
            --black: #0a0a0a;
            --dark: #1a1a2e;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-hover: rgba(255, 255, 255, 0.12);
            --border-glass: rgba(145, 70, 255, 0.4);
            --instagram: #E1306C;
            --ig-gradient: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
            --gradient-main: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #d0d0d0;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            background: linear-gradient(180deg, var(--black) 0%, #1a0033 50%, var(--black) 100%);
            background-attachment: fixed;
            font-family: 'Orbitron', sans-serif;
            color: var(--white);
            scroll-behavior: smooth;
            -webkit-user-select: auto;
            user-select: auto;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-primary: #f5f5f5;
                --bg-secondary: #ffffff;
                --text-primary: #1a1a1a;
                --text-secondary: #555555;
            }

            body {
                background: linear-gradient(180deg, #ffffff 0%, #f0e6ff 50%, #ffffff 100%);
                color: var(--text-primary);
            }
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            opacity: 1;
            transition: opacity 0.8s ease;
            overflow: hidden;
            padding: 20px;
        }

        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .loading-particles {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, var(--neon-cyan), var(--neon-pink));
            border-radius: 50%;
            box-shadow: 0 0 6px var(--neon-cyan);
            animation: particle-float 3s infinite;
        }

        @keyframes particle-float {
            0% { transform: translateY(0) translateX(0) scale(1); opacity: 1; }
            100% { transform: translateY(-500px) translateX(120px) scale(0); opacity: 0; }
        }

        .loading-container {
            text-align: center;
            position: relative;
            z-index: 10;
            max-width: 100%;
            width: 100%;
            padding: 20px;
        }

        .loading-logo {
            font-size: clamp(1.8rem, 7vw, 4rem);
            font-weight: 800;
            letter-spacing: clamp(1px, 2vw, 15px);
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-pink) 50%, var(--neon-lime) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: clamp(10px, 4vh, 40px);
            animation: logo-zoom 1s cubic-bezier(0.34, 1.56, 0.64, 1), logo-glow-intro 2s infinite 1s;
            display: block;
            word-break: break-word;
            line-height: 1.2;
        }

        @keyframes logo-zoom {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to { transform: scale(1) rotate(0); opacity: 1; }
        }

        @keyframes logo-glow-intro {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.6)); }
            50% { filter: drop-shadow(0 0 40px rgba(255, 0, 255, 0.9)); }
        }

        .loading-text {
            font-size: clamp(0.8rem, 2.5vw, 1.1rem);
            letter-spacing: clamp(0.5px, 1vw, 4px);
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-pink), var(--neon-lime));
    <style>
</html>
