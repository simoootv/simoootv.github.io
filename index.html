<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>not found</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #0a0a0a 0%, #1a0033 50%, #0a0a0a 100%);
            font-family: 'Orbitron', sans-serif;
            color: #ffffff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        .logo {
            width: 150px;
            height: 150px;
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(145, 70, 255, 0.6));
        }

        h1 {
            font-size: 4.5rem;
            font-weight: 900;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #00f0ff 0%, #ff00ff 50%, #00ff41 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(0, 240, 255, 0.5);
            filter: drop-shadow(0 0 30px rgba(145, 70, 255, 0.5));
            animation: glow-text 2s ease-in-out infinite;
        }

        .subtitle {
            font-size: 1.8rem;
            color: rgba(255, 255, 255, 0.8);
            letter-spacing: 2px;
            animation: pulse-text 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-30px); }
        }

        @keyframes glow-text {
            0%, 100% { 
                filter: drop-shadow(0 0 30px rgba(145, 70, 255, 0.5));
                text-shadow: 0 0 40px rgba(0, 240, 255, 0.5);
            }
            50% { 
                filter: drop-shadow(0 0 60px rgba(145, 70, 255, 0.8));
                text-shadow: 0 0 80px rgba(255, 0, 255, 0.8);
            }
        }

        @keyframes pulse-text {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 1; }
        }

        .particle {
            position: fixed;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, #00f0ff, #ff00ff);
            border-radius: 50%;
            box-shadow: 0 0 6px #00f0ff;
            opacity: 0.6;
            z-index: 1;
        }

        /* CRT Effect */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            z-index: 9999;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0% { opacity: 0.92; }
            50% { opacity: 1; }
            100% { opacity: 0.92; }
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="container">
    
        <h5>not found</h5>
     
    </div>

    <script>
        // Crea particelle animate
        function createParticles() {
            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.opacity = Math.random() * 0.5 + 0.3;
                
                const duration = Math.random() * 3 + 2;
                particle.style.animation = `float-particle ${duration}s infinite`;
                
                document.body.appendChild(particle);
            }
        }

        // Aggiungi animazione per particelle
        const style = document.createElement('style');
        style.textContent = `
            @keyframes float-particle {
                0% { transform: translateY(0) translateX(0) scale(1); opacity: 0.6; }
                100% { transform: translateY(-500px) translateX(120px) scale(0); opacity: 0; }
            }
        `;
        document.head.appendChild(style);

        createParticles();
    </script>
</body>
</html>
