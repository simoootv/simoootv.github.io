    <style>
        :root {
            --twitch: #9146FF;
            --neon-pink: #ff00ff;
            --black: #050505;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--black);
            font-family: 'Orbitron', sans-serif;
            color: var(--white);
            overflow-x: hidden;
        }

        /* Effetto Disturbo CRT Background */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%;
            z-index: 9999; pointer-events: none;
            animation: flicker 0.15s infinite;
        }
        @keyframes flicker { 0% { opacity: 0.9; } 50% { opacity: 1; } 100% { opacity: 0.9; } }

        /* Navbar */
        nav {
            position: fixed; top: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 5%; z-index: 1000;
            background: rgba(5, 5, 5, 0.9);
            backdrop-filter: blur(15px);
            border-bottom: 2px solid var(--twitch);
        }

        .logo-text { font-weight: 900; letter-spacing: 3px; text-shadow: 0 0 10px var(--twitch); font-size: 1.2rem; }

        .nav-links { display: flex; list-style: none; gap: 20px; }
        .nav-links a { color: var(--white); font-size: 1.4rem; transition: 0.3s; }
        .nav-links a:hover { color: var(--neon-pink); transform: scale(1.2); }

        /* Marquee Giochi */
        .games-database {
            margin-top: 90px;
            padding: 40px 0;
            background: linear-gradient(180deg, rgba(145, 70, 255, 0.15), transparent);
            text-align: center;
        }

        .db-title {
            font-size: 1.4rem; font-weight: 900; letter-spacing: 6px;
            text-shadow: 0 0 15px var(--neon-pink);
            margin-bottom: 30px; text-transform: uppercase;
        }

        .marquee-wrapper {
            width: 85%; max-width: 1000px; margin: 0 auto;
            overflow: hidden;
            mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
            -webkit-mask-image: linear-gradient(to right, transparent, black 20%, black 80%, transparent);
        }

        .marquee-content {
            display: flex; gap: 60px; padding: 20px 0;
            width: max-content;
            animation: scroll-right-smooth 20s linear infinite;
        }

        .marquee-content img { height: 65px; filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.2)); border-radius: 8px; }
        @keyframes scroll-right-smooth { from { transform: translateX(-50%); } to { transform: translateX(0%); } }

        /* Hero Section */
        .hero {
            display: flex; flex-direction: column; align-items: center;
            padding: 50px 5%; gap: 40px; text-align: center;
        }

        .hero-content { width: 100%; max-width: 600px; }

        .status-container {
            display: flex; align-items: center; justify-content: center;
            gap: 15px; margin-bottom: 25px; flex-wrap: wrap;
        }

        .live-badge {
            background: #ff0000; color: white; padding: 10px 20px;
            font-size: 0.9rem; font-weight: 900; border-radius: 5px;
            display: none; animation: pulse-live 1.5s infinite;
            white-space: nowrap; box-shadow: 0 0 15px #ff0000;
        }

        @keyframes pulse-live { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .hero-title {
            font-size: clamp(2.5rem, 8vw, 5rem); font-weight: 900;
            line-height: 0.9; margin-bottom: 15px; transition: 0.5s ease;
        }
        .hero-title span { color: transparent; -webkit-text-stroke: 2px var(--neon-pink); }
        .hero-title .live-text { display: block; font-size: clamp(1.5rem, 5vw, 2.5rem); color: var(--twitch); -webkit-text-stroke: 0; margin-top: 10px; }

        .countdown-container { display: none; margin-bottom: 25px; font-size: 1.1rem; letter-spacing: 2px; color: #aaa; }
        .countdown-container .time { display: block; font-size: clamp(1.8rem, 5vw, 2.8rem); color: var(--neon-pink); font-weight: 900; text-shadow: 0 0 15px var(--neon-pink); margin-top: 5px; }

        .btn-live {
            background: var(--white); color: var(--black); padding: 18px 40px; text-decoration: none; font-weight: 900;
            font-size: 1.1rem; display: inline-block; text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); border: none; cursor: pointer;
        }
        .btn-live.btn-explore { background: var(--twitch); color: var(--white); box-shadow: 0 0 20px var(--twitch); }
        .btn-live:hover { transform: translateY(-3px); filter: brightness(1.2); }

        .hero-socials { display: flex; gap: 25px; justify-content: center; margin-top: 30px;}
        .hero-socials a { color: var(--white); font-size: 2.2rem; transition: 0.3s; }
        .hero-socials a:hover { color: var(--neon-pink); transform: scale(1.2); }

        .live-container {
            width: 100%; max-width: 950px; aspect-ratio: 16 / 9;
            border: 4px solid var(--twitch); border-radius: 20px;
            overflow: hidden; background: #000; box-shadow: 0 0 30px rgba(145, 70, 255, 0.4); margin: 0 auto;
        }

        /* Calendario */
        .calendar-section { padding: 80px 5%; text-align: center; border-top: 1px solid rgba(145, 70, 255, 0.2); }
        .calendar-container { max-width: 800px; margin: 0 auto; border: 3px solid var(--twitch); border-radius: 25px; overflow: hidden; background: #000; box-shadow: 0 0 20px var(--twitch); }
        .calendar-img { width: 100%; height: auto; display: block; transition: 0.5s; }

        /* Modal Social */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 10000; opacity: 0; transition: 0.3s;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-content { background: #111; border: 2px solid var(--twitch); padding: 40px; border-radius: 20px; text-align: center; width: 90%; max-width: 500px; }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .social-item { background: var(--glass); padding: 25px; border-radius: 12px; text-decoration: none; color: white; transition: 0.3s; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .social-item i { font-size: 2rem; }
        .social-item:hover { background: rgba(145, 70, 255, 0.3); transform: translateY(-5px); border: 1px solid var(--neon-pink); }
        .close-modal { margin-top: 35px; background: none; border: 1px solid #444; color: #888; padding: 12px 25px; cursor: pointer; font-family: 'Orbitron'; }

        @media (min-width: 1024px) {
            .hero { flex-direction: row; text-align: left; padding: 80px 5%; justify-content: space-between; }
            .status-container { justify-content: flex-start; }
            .hero-socials { justify-content: flex-start; }
        }
    </style>

    <script src="https://embed.twitch.tv/embed/v1.js"></script>
    <script>
        var embed = new Twitch.Embed("twitch-embed", {
            width: "100%", height: "100%", channel: "simooo_tv",
            parent: ["simoootv.github.io", "localhost"],
            layout: "video", autoplay: true, muted: true
        });

        let countdownInterval;
        let statusKnown = false;

        function updateUI(isLive) {
            if (statusKnown && isLive === false) return; 
            statusKnown = true;

            const btn = document.getElementById('status-btn');
            const badge = document.getElementById('live-badge');
            const title = document.getElementById('main-title');

            if (isLive) {
                stopCountdown();
                btn.innerHTML = "ENTRA IN LIVE";
                btn.classList.remove('btn-explore');
                btn.href = "https://twitch.tv/simooo_tv";
                btn.onclick = null;
                badge.style.display = "block";
                title.innerHTML = "SIMOOO<span>TV</span> <span class='live-text'>È IN ONDA ORA!</span>";
            } else {
                startCountdown();
                btn.innerHTML = "SCOPRI I SOCIAL";
                btn.classList.add('btn-explore');
                btn.href = "#";
                btn.onclick = (e) => { e.preventDefault(); toggleModal(); };
                badge.style.display = "none";
                title.innerHTML = "SIMOOO_TV <br><span>OFFLINE</span>";
            }
        }

        function getNextLiveTime() {
            const now = new Date();
            const t1 = new Date(now); t1.setHours(14, 30, 0, 0);
            const t2 = new Date(now); t2.setHours(20, 45, 0, 0);
            if (now < t1) return t1;
            if (now < t2) return t2;
            const tomorrow = new Date(now); tomorrow.setDate(tomorrow.getDate() + 1);
            tomorrow.setHours(14, 30, 0, 0);
            return tomorrow;
        }

        function startCountdown() {
            const wrapper = document.getElementById('countdown-wrapper');
            wrapper.style.display = 'block';
            if (countdownInterval) clearInterval(countdownInterval);
            const update = () => {
                const diff = getNextLiveTime() - new Date();
                if (diff <= 0) { document.getElementById('countdown-timer').innerText = "STA PER INIZIARE!"; return; }
                const h = Math.floor((diff / 3600000) % 24).toString().padStart(2, '0');
                const m = Math.floor((diff / 60000) % 60).toString().padStart(2, '0');
                const s = Math.floor((diff / 1000) % 60).toString().padStart(2, '0');
                document.getElementById('countdown-timer').innerText = `${h}h ${m}m ${s}s`;
            };
            update();
            countdownInterval = setInterval(update, 1000);
        }

        function stopCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);
            document.getElementById('countdown-wrapper').style.display = 'none';
        }

        embed.addEventListener(Twitch.Embed.VIDEO_PLAY, () => updateUI(true));
        embed.addEventListener(Twitch.Embed.OFFLINE, () => updateUI(false));

        setTimeout(() => {
            if (!statusKnown) {
                const player = embed.getPlayer();
                if (player && player.getPlaybackStats()?.video_res !== "0x0") {
                    updateUI(true);
                } else {
                    updateUI(false);
                }
            }
        }, 5000);

        function toggleModal() { document.getElementById('socialModal').classList.toggle('active'); }
    </script>
